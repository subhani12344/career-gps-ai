version: '3.8'

services:
  # 1. MongoDB Database (for Express Backend)
  mongodb:
    image: mongo:latest
    container_name: career-gps-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - career-gps-network

  # 2. PostgreSQL Database (for FastAPI Microservice)
  postgres-db:
    image: postgres:15-alpine
    container_name: career-gps-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=careergps_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - career-gps-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careergps_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Node Express API Server
  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: career-gps-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/careergps
      - JWT_SECRET=career_gps_super_secret_jwt_key_12345
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - career-gps-network

  # 4. FastAPI Python Microservice
  fastapi-backend:
    build:
      context: ../fastapi-server
      dockerfile: Dockerfile
    container_name: career-gps-fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@postgres-db:5432/careergps_db
      - JWT_SECRET=career_gps_super_secret_jwt_key_12345
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - career-gps-network

  # 5. Frontend UI Client
  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: career-gps-client
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - fastapi-backend
    networks:
      - career-gps-network

networks:
  career-gps-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  postgres-data:
    driver: local
